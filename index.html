<!DOCTYPE html>
<html lang="en" class="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo — Premium Minimalist Workspace</title>
  
  <!-- Premium favicon using user provided logo -->
  <link rel="icon" type="image/jpeg" href="https://i.ibb.co/h1FnYn0q/SAYO-on-Instagram-Letter-H-Logo-Symbol-Minimalism-lettering-letterings-letters-lovele.jpg">

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'SF Pro Display', '-apple-system', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Cropper.js CDN for image cropping -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

  <!-- Google Fonts for premium typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Custom Core Animations & Styles -->
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
    
    /* Premium micro-interactions & animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .animate-fade-in {
      animation: fadeIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .animate-slide-up {
      animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .animate-slide-down {
      animation: slideDown 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    /* Hide standard scrollbars cleanly for minimalist design cards */
    .scrollbar-none::-webkit-scrollbar {
      display: none;
    }
    .scrollbar-none {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* Custom premium loaders */
    .loader {
      width: 65px;
      aspect-ratio: 1;
      position: relative;
    }
    .loader:before,
    .loader:after {
      content: "";
      position: absolute;
      border-radius: 50px;
      box-shadow: 0 0 0 3px inset #ffffff;
      animation: l4 2.5s infinite;
    }
    .loader:after {
      animation-delay: -1.25s;
    }
    @keyframes l4 {
      0% {
        inset: 0 35px 35px 0;
      }
      12.5% {
        inset: 0 35px 0 0;
      }
      25% {
        inset: 35px 35px 0 0;
      }
      37.5% {
        inset: 35px 0 0 0;
      }
      50% {
        inset: 35px 0 0 35px;
      }
      62.5% {
        inset: 0 0 0 35px;
      }
      75% {
        inset: 0 0 35px 35px;
      }
      87.5% {
        inset: 0 0 35px 0;
      }
      100% {
        inset: 0 35px 35px 0;
      }
    }

    /* Custom Cropper style overrides to match dark mode */
    .cropper-view-box,
    .cropper-face {
      border-radius: 50%;
    }
    .cropper-line, .cropper-point {
      background-color: #111111;
    }
    .dark .cropper-line, .dark .cropper-point {
      background-color: #ffffff;
    }
  </style>
</head>
<body class="min-h-screen w-full flex bg-[#f8f9fa] text-neutral-900 dark:bg-[#090909] dark:text-neutral-100 transition-colors duration-300">

  <!-- ================= STREAMING_CHUNK: Adding splash loader screen ================= -->
  <!-- Premium startup splash loader screen overlay -->
  <div id="splash-screen" class="fixed inset-0 bg-[#090909] z-[60] flex flex-col items-center justify-center gap-8 transition-all duration-700 pointer-events-auto">
    <div class="flex flex-col items-center gap-6">
      <img src="https://i.ibb.co/h1FnYn0q/SAYO-on-Instagram-Letter-H-Logo-Symbol-Minimalism-lettering-letterings-letters-lovele.jpg" class="w-16 h-16 rounded-2xl object-cover shadow-2xl border border-white/10 opacity-90 animate-pulse" alt="H Logo">
      <div class="loader"></div>
      <p class="text-[10px] tracking-[0.25em] font-extrabold uppercase text-neutral-400 animate-pulse">Syncing Environment</p>
    </div>
  </div>

  <!-- ================= TOASTS NOTIFICATIONS PORTAL ================= -->
  <div id="toast-portal" class="fixed top-6 right-6 z-50 flex flex-col gap-2.5 max-w-sm pointer-events-none"></div>

  <!-- ================= MAIN LAYOUT WRAPPER ================= -->
  <div class="min-h-screen w-full flex">
    
    <!-- === DESKTOP SIDEBAR NAVIGATION === -->
    <aside id="sidebar" class="hidden lg:flex flex-col justify-between p-6 border-r transition-all duration-300 bg-white dark:bg-[#0f0f0f] w-64 border-neutral-200/60 dark:border-neutral-900">
      <div class="space-y-8">
        <!-- Logo / Brand with Premium H Logo -->
        <div class="flex items-center gap-3">
          <img src="https://i.ibb.co/h1FnYn0q/SAYO-on-Instagram-Letter-H-Logo-Symbol-Minimalism-lettering-letterings-letters-lovele.jpg" class="w-10 h-10 rounded-2xl object-cover shadow-sm border border-neutral-200/40 dark:border-neutral-800" alt="H logo">
          <div id="sidebar-brand-text">
            <h1 class="text-md font-extrabold tracking-tight">Todo</h1>
            <p class="text-[10px] text-neutral-400 font-medium">Workspace Premium</p>
          </div>
        </div>

        <!-- Quick Task Trigger CTA -->
        <div class="px-1">
          <button onclick="handleOpenAddTask()" class="w-full py-3 px-4 rounded-xl bg-neutral-950 hover:bg-neutral-900 text-white dark:bg-white dark:text-neutral-950 dark:hover:bg-neutral-100 font-bold text-xs flex items-center justify-center gap-2 shadow-sm transition active:scale-[0.98]">
            <i data-lucide="plus" class="w-4 h-4"></i>
            <span id="sidebar-cta-text">New Schedule</span>
          </button>
        </div>

        <!-- Navigation Links -->
        <nav class="space-y-1.5" id="sidebar-nav"></nav>
      </div>

      <!-- User profile & Footer block -->
      <div class="pt-6 border-t border-neutral-100 dark:border-neutral-900">
        <div onclick="handleOpenProfileModal()" class="flex items-center gap-3 cursor-pointer group hover:opacity-80 transition-all">
          <div id="sidebar-avatar" class="w-9 h-9 rounded-full bg-neutral-100 dark:bg-neutral-900 flex items-center justify-center font-bold text-neutral-750 dark:text-neutral-200 overflow-hidden border border-neutral-200/30 dark:border-neutral-800">
            JD
          </div>
          <div id="sidebar-profile-text" class="min-w-0">
            <h4 class="text-xs font-bold truncate group-hover:text-neutral-950 dark:group-hover:text-white transition-colors">John Doe</h4>
            <p class="text-[10px] text-neutral-400 truncate">Premium Workspace</p>
          </div>
        </div>
        
        <!-- Sidebar theme switch panel -->
        <button onclick="toggleDarkMode()" id="sidebar-theme-btn" class="mt-4 w-full py-2 px-3 rounded-xl border border-neutral-200 dark:border-neutral-800 flex items-center justify-between text-[10px] font-bold hover:bg-neutral-50 dark:hover:bg-neutral-900 transition">
          <span class="text-neutral-500">Appearance</span>
          <div class="flex items-center gap-1 text-neutral-800 dark:text-neutral-200">
            <i data-lucide="sun" class="w-3 h-3 block dark:hidden"></i>
            <i data-lucide="moon" class="w-3 h-3 hidden dark:block"></i>
            <span id="sidebar-theme-label">Light</span>
          </div>
        </button>
      </div>
    </aside>

    <!-- === MAIN PAGE CONTAINER WRAPPER === -->
    <main class="flex-1 flex flex-col min-w-0 bg-[#fbfbfb] dark:bg-[#090909] pb-24 lg:pb-8">
      
      <!-- TOP STICKY BAR -->
      <header class="px-6 py-4 flex items-center justify-between border-b border-neutral-100 dark:border-neutral-900 bg-white/70 dark:bg-[#0f0f0f]/70 backdrop-blur-md sticky top-0 z-30">
        <!-- Mobile Logo -->
        <div class="flex items-center gap-3 lg:hidden">
          <img src="https://i.ibb.co/h1FnYn0q/SAYO-on-Instagram-Letter-H-Logo-Symbol-Minimalism-lettering-letterings-letters-lovele.jpg" class="w-8 h-8 rounded-xl object-cover shadow-sm border border-neutral-200/40 dark:border-neutral-800" alt="H logo">
          <span class="text-xs font-black tracking-tight uppercase">Todo</span>
        </div>

        <div class="hidden lg:flex items-center gap-3">
          <span class="text-[10px] font-extrabold uppercase tracking-widest text-neutral-400">Workspace Dashboard</span>
          <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
          <span class="text-[10px] font-bold text-neutral-400">Sync Online</span>
        </div>

        <!-- Real-Time Date and Clock in sticky top header -->
        <div class="flex items-center gap-4">
          <div class="text-right select-none hidden sm:block">
            <p id="live-time-ticker" class="text-xs font-extrabold tracking-tight text-neutral-800 dark:text-neutral-200"></p>
            <p id="live-date-ticker" class="text-[9px] font-bold text-neutral-400 uppercase tracking-widest"></p>
          </div>

          <!-- Clickable Avatar to quickly open Profile Modal -->
          <div onclick="handleOpenProfileModal()" class="w-8 h-8 rounded-full bg-neutral-100 dark:bg-neutral-900 border border-neutral-200 dark:border-neutral-800 flex items-center justify-center cursor-pointer overflow-hidden hover:opacity-85 transition-opacity" id="header-avatar-btn">
            <div id="topbar-avatar" class="w-full h-full flex items-center justify-center font-bold text-xs text-neutral-700 dark:text-neutral-300">JD</div>
          </div>

          <div class="flex items-center gap-2">
            <button onclick="toggleDarkMode()" class="p-2 rounded-xl border border-neutral-200 dark:border-neutral-800 bg-white dark:bg-[#0f0f0f] text-neutral-500 hover:text-neutral-800 dark:hover:text-neutral-200 transition" title="Toggle Theme">
              <i data-lucide="sun" class="w-3.5 h-3.5 block dark:hidden"></i>
              <i data-lucide="moon" class="w-3.5 h-3.5 hidden dark:block"></i>
            </button>
            <button onclick="handleOpenAddTask()" class="lg:hidden p-2 rounded-xl bg-neutral-950 text-white dark:bg-white dark:text-neutral-950 shadow-sm" title="Create New Task">
              <i data-lucide="plus" class="w-3.5 h-3.5"></i>
            </button>
          </div>
        </div>
      </header>

      <!-- ACTIVE TAB CONTENT HOST -->
      <div id="tab-content" class="p-6 max-w-7xl w-full mx-auto space-y-6 flex-1 animate-fade-in"></div>

    </main>

    <!-- === MOBILE CAPSULE NAVIGATION BAR === -->
    <div class="lg:hidden fixed bottom-6 left-6 right-6 h-[66px] bg-neutral-950/95 dark:bg-neutral-900/95 text-white rounded-3xl flex items-center justify-between px-6 shadow-2xl z-40 border border-white/10 backdrop-blur-md" id="mobile-dock"></div>

  </div>

  <!-- ================= STREAMING_CHUNK: Adding profile edit and crop modal ================= -->
  <!-- ================= EDIT PROFILE & CROP MODAL ================= -->
  <div id="profile-modal-container" class="fixed inset-0 bg-black/60 dark:bg-black/85 backdrop-blur-xs z-50 flex flex-col justify-end lg:justify-center lg:items-center p-0 lg:p-6 transition-all duration-300 hidden">
    <!-- Backdrop close zone -->
    <div class="absolute inset-0" onclick="handleCloseProfileModal()"></div>
    
    <div class="relative w-full lg:max-w-md bg-white dark:bg-[#0f0f0f] rounded-t-[32px] lg:rounded-3xl p-6 max-h-[90%] lg:max-h-full overflow-y-auto animate-slide-up lg:animate-fade-in border border-neutral-200/40 dark:border-neutral-900 shadow-2xl z-10">
      
      <!-- Modal Header -->
      <div class="flex items-center justify-between pb-4 border-b border-neutral-100 dark:border-neutral-900">
        <h3 class="text-md font-extrabold text-neutral-900 dark:text-white">Edit User Profile</h3>
        <button onclick="handleCloseProfileModal()" class="w-8 h-8 bg-neutral-50 dark:bg-neutral-900 hover:bg-neutral-100 rounded-full flex items-center justify-center text-neutral-500 transition">
          <i data-lucide="x" class="w-4 h-4"></i>
        </button>
      </div>

      <!-- MAIN PROFILE EDIT FORM -->
      <form id="profile-edit-form" onsubmit="handleSaveProfile(event)" class="mt-5 space-y-5 text-xs font-semibold text-neutral-800 dark:text-neutral-200">
        
        <!-- Premium Crop File Upload area -->
        <div class="flex flex-col items-center justify-center gap-3">
          <div class="relative w-24 h-24 rounded-full bg-neutral-100 dark:bg-neutral-900 border border-neutral-200 dark:border-neutral-800 flex items-center justify-center group overflow-hidden">
            <div id="modal-profile-avatar-preview" class="w-full h-full flex items-center justify-center font-bold text-2xl text-neutral-700 dark:text-neutral-300">
              JD
            </div>
            <!-- Overlay Change trigger button -->
            <button type="button" onclick="triggerAvatarUpload()" class="absolute inset-0 bg-black/50 text-white flex flex-col items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity duration-300">
              <i data-lucide="camera" class="w-4 h-4 mb-0.5"></i>
              <span class="text-[8px] uppercase tracking-wider font-extrabold">Change</span>
            </button>
          </div>
          
          <!-- Hidden Input Node for avatar image selection -->
          <input type="file" id="profile-file-input" accept="image/*" class="hidden" onchange="handleAvatarFileSelect(event)">
          <p class="text-[9px] text-neutral-400 font-bold uppercase tracking-wider">Click photo to upload & crop</p>
        </div>

        <!-- Name input -->
        <div class="space-y-1.5">
          <label class="text-[10px] uppercase tracking-wider text-neutral-400 font-extrabold">Full Name</label>
          <input type="text" id="profile-name-input" required class="w-full p-3.5 rounded-xl bg-neutral-50 dark:bg-neutral-900 border border-neutral-250 dark:border-neutral-850 text-neutral-800 dark:text-neutral-200 focus:outline-none focus:ring-1 focus:ring-neutral-950 transition">
        </div>

        <!-- Role/Plan input -->
        <div class="space-y-1.5">
          <label class="text-[10px] uppercase tracking-wider text-neutral-400 font-extrabold">Workspace status / role</label>
          <input type="text" id="profile-plan-input" required class="w-full p-3.5 rounded-xl bg-neutral-50 dark:bg-neutral-900 border border-neutral-250 dark:border-neutral-850 text-neutral-800 dark:text-neutral-200 focus:outline-none focus:ring-1 focus:ring-neutral-950 transition">
        </div>

        <!-- Submit CTAs -->
        <div class="pt-4 flex gap-3">
          <button type="button" onclick="handleCloseProfileModal()" class="flex-1 py-3.5 text-xs font-bold text-neutral-600 bg-neutral-100 dark:bg-neutral-900 dark:text-neutral-300 rounded-xl hover:bg-neutral-200/50 transition">Cancel</button>
          <button type="submit" class="flex-1 py-3.5 text-xs font-bold text-white bg-neutral-950 dark:bg-white dark:text-neutral-950 rounded-xl shadow-md hover:opacity-90 transition">Save Changes</button>
        </div>
      </form>

      <!-- IMAGE CROPPING SUB-INTERFACE (Toggled on upload) -->
      <div id="cropping-view" class="mt-5 space-y-4 hidden animate-fade-in">
        <div class="text-[10px] uppercase tracking-wider text-neutral-400 font-extrabold mb-1">Adjust Crop Boundary</div>
        
        <!-- Cropper Box container -->
        <div class="w-full max-h-[280px] rounded-2xl overflow-hidden bg-neutral-50 dark:bg-[#161616] border border-neutral-200/60 dark:border-neutral-900 flex justify-center items-center">
          <img id="cropping-image-element" src="" class="max-w-full block">
        </div>

        <!-- Crop CTAs -->
        <div class="flex gap-3">
          <button type="button" onclick="cancelCropping()" class="flex-1 py-3 text-xs font-bold text-neutral-600 bg-neutral-100 dark:bg-neutral-900 dark:text-neutral-300 rounded-xl transition">Back</button>
          <button type="button" onclick="applyCroppedImage()" class="flex-1 py-3 text-xs font-bold text-white bg-neutral-950 dark:bg-white dark:text-neutral-950 rounded-xl shadow transition">Crop & Set</button>
        </div>
      </div>

    </div>
  </div>

  <!-- ================= TASK CREATION/EDIT MODAL ================= -->
  <div id="modal-container" class="fixed inset-0 bg-black/60 dark:bg-black/85 backdrop-blur-xs z-50 flex-col justify-end lg:justify-center lg:items-center p-0 lg:p-6 transition-all duration-300 hidden">
    <!-- Backdrop close zone -->
    <div class="absolute inset-0" onclick="handleCloseModal()"></div>
    
    <div class="relative w-full lg:max-w-lg bg-white dark:bg-[#0f0f0f] rounded-t-[32px] lg:rounded-3xl p-6 max-h-[90%] lg:max-h-full overflow-y-auto animate-slide-up lg:animate-fade-in border border-neutral-200/40 dark:border-neutral-900 shadow-2xl z-10">
      <div class="flex items-center justify-between pb-4 border-b border-neutral-100 dark:border-neutral-900">
        <h3 id="modal-title" class="text-md font-extrabold text-neutral-900 dark:text-white">Schedule New Goal</h3>
        <button onclick="handleCloseModal()" class="w-8 h-8 bg-neutral-50 dark:bg-neutral-900 hover:bg-neutral-100 rounded-full flex items-center justify-center text-neutral-500 transition">
          <i data-lucide="x" class="w-4 h-4"></i>
        </button>
      </div>

      <form id="task-form" onsubmit="handleSaveTask(event)" class="mt-5 space-y-4 text-xs font-semibold text-neutral-800 dark:text-neutral-200">
        <!-- Hidden Task Id Input for Edit State tracking -->
        <input type="hidden" id="form-task-id">

        <!-- Task title -->
        <div class="space-y-1.5">
          <label class="text-[10px] uppercase tracking-wider text-neutral-400 font-extrabold">Task description</label>
          <input type="text" id="form-title" required placeholder="e.g., Setup client review call" class="w-full p-3.5 rounded-xl bg-neutral-50 dark:bg-neutral-900 border border-neutral-250 dark:border-neutral-850 text-neutral-800 dark:text-neutral-200 focus:outline-none focus:ring-1 focus:ring-neutral-950 transition">
        </div>

        <!-- Priority flag switcher -->
        <div class="space-y-1.5">
          <label class="text-[10px] uppercase tracking-wider text-neutral-400 font-extrabold">Task Priority Level</label>
          <div class="grid grid-cols-3 gap-2" id="form-priority-grid">
            <button type="button" onclick="setFormPriority('low')" id="priority-btn-low" class="p-3 rounded-xl border flex flex-col items-center justify-center gap-1.5 capitalize font-extrabold transition border-neutral-250 dark:border-neutral-900 text-neutral-500 dark:text-neutral-400">
              <i data-lucide="flag" class="w-3.5 h-3.5 text-green-500"></i>
              Normal
            </button>
            <button type="button" onclick="setFormPriority('medium')" id="priority-btn-medium" class="p-3 rounded-xl border flex flex-col items-center justify-center gap-1.5 capitalize font-extrabold transition border-neutral-250 dark:border-neutral-900 text-neutral-500 dark:text-neutral-400">
              <i data-lucide="flag" class="w-3.5 h-3.5 text-orange-500"></i>
              Medium
            </button>
            <button type="button" onclick="setFormPriority('high')" id="priority-btn-high" class="p-3 rounded-xl border flex flex-col items-center justify-center gap-1.5 capitalize font-extrabold transition border-neutral-250 dark:border-neutral-900 text-neutral-500 dark:text-neutral-400">
              <i data-lucide="flag" class="w-3.5 h-3.5 text-red-500"></i>
              High
            </button>
          </div>
          <input type="hidden" id="form-priority" value="low">
        </div>

        <!-- Categories custom badges -->
        <div class="space-y-1.5">
          <label class="text-[10px] uppercase tracking-wider text-neutral-400 font-extrabold">Task Category Tag</label>
          <div class="flex gap-2 overflow-x-auto pb-1.5 scrollbar-none" id="form-categories-list"></div>
          <input type="hidden" id="form-category" value="Work">
        </div>

        <!-- Timeline Slots -->
        <div class="grid grid-cols-2 gap-3">
          <div class="space-y-1.5">
            <label class="text-[10px] uppercase tracking-wider text-neutral-400 font-extrabold">Day</label>
            <select id="form-day" class="w-full p-3.5 rounded-xl bg-neutral-50 dark:bg-neutral-900 border border-neutral-200 dark:border-neutral-850 text-xs text-neutral-850 dark:text-neutral-200 focus:outline-none">
              <option value="Monday">Monday</option>
              <option value="Tuesday">Tuesday</option>
              <option value="Wednesday">Wednesday</option>
              <option value="Thursday">Thursday</option>
              <option value="Friday" selected>Friday</option>
              <option value="Saturday">Saturday</option>
              <option value="Sunday">Sunday</option>
            </select>
          </div>

          <div class="space-y-1.5">
            <label class="text-[10px] uppercase tracking-wider text-neutral-400 font-extrabold">Timing Slot</label>
            <select id="form-section" class="w-full p-3.5 rounded-xl bg-neutral-50 dark:bg-neutral-900 border border-neutral-200 dark:border-neutral-850 text-xs text-neutral-850 dark:text-neutral-200 focus:outline-none">
              <option value="Morning" selected>Morning</option>
              <option value="Afternoon">Afternoon</option>
              <option value="Evening">Evening</option>
            </select>
          </div>
        </div>

        <!-- Start Time and Duration inputs -->
        <div class="grid grid-cols-2 gap-3">
          <div class="space-y-1.5">
            <label class="text-[10px] uppercase tracking-wider text-neutral-400 font-extrabold">Start Time</label>
            <input type="text" id="form-time" placeholder="e.g., 09:30 AM" class="w-full p-3.5 rounded-xl bg-neutral-50 dark:bg-neutral-900 border border-neutral-200 dark:border-neutral-850 text-xs text-neutral-850 dark:text-neutral-200 focus:outline-none">
          </div>

          <div class="space-y-1.5">
            <label class="text-[10px] uppercase tracking-wider text-neutral-400 font-extrabold">Duration</label>
            <input type="text" id="form-duration" placeholder="e.g., 45 min" class="w-full p-3.5 rounded-xl bg-neutral-50 dark:bg-neutral-900 border border-neutral-200 dark:border-neutral-850 text-xs text-neutral-850 dark:text-neutral-200 focus:outline-none">
          </div>
        </div>

        <!-- Note tag -->
        <div class="space-y-1.5">
          <label class="text-[10px] uppercase tracking-wider text-neutral-400 font-extrabold">Label Status Note (Optional)</label>
          <input type="text" id="form-label" placeholder="e.g., Yesterday, 7 days ago" class="w-full p-3.5 rounded-xl bg-neutral-50 dark:bg-neutral-900 border border-neutral-200 dark:border-neutral-850 text-xs text-neutral-850 dark:text-neutral-200 focus:outline-none">
        </div>

        <!-- CTA action controls -->
        <div class="pt-4 flex gap-3">
          <button type="button" onclick="handleCloseModal()" class="flex-1 py-3.5 text-xs font-bold text-neutral-600 bg-neutral-100 dark:bg-neutral-900 dark:text-neutral-300 rounded-xl hover:bg-neutral-200/50 transition">Cancel</button>
          <button type="submit" class="flex-1 py-3.5 text-xs font-bold text-white bg-neutral-950 dark:bg-white dark:text-neutral-950 rounded-xl shadow-md hover:opacity-90 transition">Save Schedule</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ================= JAVASCRIPT APP ENGINE ================= -->
  <script>
    const INITIAL_TASKS = [

    // Real-Time and Date update function

      const now = new Date();

      const formattedDate = now.toLocaleDateString('en-US', dateOptions);
      
      // Time formatting
      const timeOptions = { hour: 'numeric', minute: '2-digit', second: '2-digit', hour12: true };
      const formattedTime = now.toLocaleTimeString('en-US', timeOptions);

      // Tick to DOM
      const timeContainer = document.getElementById('live-time-ticker');
      const dateContainer = document.getElementById('live-date-ticker');
      
      if (timeContainer) timeContainer.textContent = formattedTime;
      if (dateContainer) dateContainer.textContent = formattedDate;

    // Modern custom overlay Toast notification alert triggers
    function showToast(message, type = 'success') {
      const portal = document.getElementById('toast-portal');
      const id = Date.now();
      
      const toast = document.createElement('div');
      toast.id = `toast-${id}`;
      toast.className = `p-4 rounded-2xl shadow-xl border flex items-center gap-3 animate-slide-down pointer-events-auto transform transition-all duration-300 ${
        type === 'success' 
          ? 'bg-neutral-900 text-white border-neutral-800 dark:bg-white dark:text-neutral-950' 
          : type === 'error'
          ? 'bg-red-50 text-red-950 border-red-200 dark:bg-red-950/90 dark:text-red-100 dark:border-red-900'
          : 'bg-blue-50 text-blue-950 border-blue-200 dark:bg-blue-950/90 dark:text-blue-100 dark:border-blue-900'
      }`;

      const iconName = type === 'success' ? 'check-circle-2' : 'alert-circle';
      const iconColor = type === 'success' ? 'text-emerald-500' : 'text-amber-500';

      toast.innerHTML = `
        <i data-lucide="${iconName}" class="w-4 h-4 ${iconColor}"></i>
        <p class="text-xs font-semibold tracking-tight">${message}</p>
      `;

      portal.appendChild(toast);
      lucide.createIcons();

      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateY(-10px)';
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }

    // Helper to extract initials from name
    function getInitials(name) {
      if (!name) return 'JD';
      const parts = name.trim().split(/\s+/);
      if (parts.length >= 2) {
        return (parts[0][0] + parts[1][0]).toUpperCase();
      }
      return parts[0].substring(0, 2).toUpperCase();
    }

                    isCompleted ? 'line-through text-neutral-400 dark:text-neutral-500' : 'text-neutral-800 dark:text-neutral-200'

                    <span class="text-[9px] font-bold text-neutral-400/80 bg-neutral-100 dark:bg-neutral-900 px-1.5 py-0.5 rounded-md whitespace-nowrap">

          btn.className = "px-3.5 py-2 rounded-xl border whitespace-nowrap transition-all bg-neutral-950 text-white dark:bg-white dark:text-neutral-950 border-transparent font-bold";
        } else {
          btn.className = "px-3.5 py-2 rounded-xl border whitespace-nowrap transition-all border-neutral-200 dark:border-neutral-850 text-neutral-600 dark:text-neutral-400 hover:bg-neutral-50 dark:hover:bg-neutral-900";
        }
      });
    }

    // Set Form Priority Levels switcher UI
    function setFormPriority(priority) {
      document.getElementById('form-priority').value = priority;
      const priorities = ['low', 'medium', 'high'];
      const colors = {
        low: 'border-green-500 text-green-600 bg-green-500/5 border-2 scale-[1.02]',
        medium: 'border-orange-500 text-orange-600 bg-orange-500/5 border-2 scale-[1.02]',
        high: 'border-red-500 text-red-600 bg-red-500/5 border-2 scale-[1.02]'
      };

      priorities.forEach(p => {
        const btn = document.getElementById(`priority-btn-${p}`);
        if (p === priority) {
          btn.className = `p-3 rounded-xl border flex flex-col items-center justify-center gap-1.5 capitalize font-extrabold transition ${colors[p]}`;
        } else {
          btn.className = "p-3 rounded-xl border flex flex-col items-center justify-center gap-1.5 capitalize font-extrabold transition border-neutral-250 dark:border-neutral-900 text-neutral-500 dark:text-neutral-400 hover:bg-neutral-50 dark:hover:bg-neutral-900";
        }
      });
    }

    // Open/Close Modal Controller
    function handleOpenAddTask() {
      // Setup default configuration
      document.getElementById('modal-title').textContent = "Schedule New Goal";
      document.getElementById('form-task-id').value = "";
      document.getElementById('form-title').value = "";
      setFormPriority('low');
      setFormCategory('Work');
      document.getElementById('form-day').value = state.selectedDay;
      document.getElementById('form-section').value = "Morning";
      document.getElementById('form-time').value = "10:00 AM";
      document.getElementById('form-duration').value = "30 min";
      document.getElementById('form-label').value = "";

      const modal = document.getElementById('modal-container');
      modal.className = "fixed inset-0 bg-black/60 dark:bg-black/85 backdrop-blur-xs z-50 flex flex-col justify-end lg:justify-center lg:items-center p-0 lg:p-6 transition-all duration-300";
    }

    function handleOpenEditTask(taskId) {
      const task = state.tasks.find(t => t.id === taskId);
      if (!task) return;

      document.getElementById('modal-title').textContent = "Modify Active Goal Schedule";
      document.getElementById('form-task-id').value = task.id;
      document.getElementById('form-title').value = task.title;
      setFormPriority(task.priority);
      setFormCategory(task.category || 'Work');
      document.getElementById('form-day').value = task.day;
      document.getElementById('form-section').value = task.section;
      document.getElementById('form-time').value = task.time || "";
      document.getElementById('form-duration').value = task.duration || "30 min";
      document.getElementById('form-label').value = task.label || "";

      const modal = document.getElementById('modal-container');
      modal.className = "fixed inset-0 bg-black/60 dark:bg-black/85 backdrop-blur-xs z-50 flex flex-col justify-end lg:justify-center lg:items-center p-0 lg:p-6 transition-all duration-300";
    }

    function handleCloseModal() {
      const modal = document.getElementById('modal-container');
      modal.className = "fixed inset-0 bg-black/60 dark:bg-black/85 backdrop-blur-xs z-50 flex-col justify-end lg:justify-center lg:items-center p-0 lg:p-6 transition-all duration-300 hidden";
    }

    // Submit save/create task callback
    function handleSaveTask(event) {
      event.preventDefault();
      const taskId = document.getElementById('form-task-id').value;
      const title = document.getElementById('form-title').value;
      const priority = document.getElementById('form-priority').value;
      const category = document.getElementById('form-category').value;
      const day = document.getElementById('form-day').value;
      const section = document.getElementById('form-section').value;
      const time = document.getElementById('form-time').value;
      const duration = document.getElementById('form-duration').value;
      const labelValue = document.getElementById('form-label').value;

      if (!title.trim()) {
        showToast('Please type a task description', 'error');
        return;
      }

      if (taskId) {
        // Edit Mode Update
        state.tasks = state.tasks.map(t => t.id === taskId ? {
          ...t,
          title,
          priority,
          category,
          day,
          section,
          time,
          duration,
          label: labelValue || undefined
        } : t);
        showToast('Goal modification updated successfully');
      } else {
        // Save Mode Add
        const newTask = {
          id: Date.now().toString(),
          title,
          priority,
          category,
          section,
          day,
          time,
          date: day === 'Friday' ? '2026-02-20' : (day === 'Monday' ? '2026-02-16' : '2026-02-17'),
          completed: false,
          duration,
          label: labelValue || undefined
        };
        state.tasks = [newTask, ...state.tasks];
        showToast('Goal added to calendar schedule');
      }

      handleCloseModal();
      renderActiveTab();
      lucide.createIcons();
    }

    // PROFILE EDIT MODAL LOGIC
    function handleOpenProfileModal() {
      // Set input values to current state values
      document.getElementById('profile-name-input').value = state.profile.name;
      document.getElementById('profile-plan-input').value = state.profile.plan;
      
      const initials = getInitials(state.profile.name);
      const previewNode = document.getElementById('modal-profile-avatar-preview');
      if (state.profile.avatar) {
        previewNode.innerHTML = `<img src="${state.profile.avatar}" class="w-full h-full rounded-full object-cover">`;
      } else {
        previewNode.textContent = initials;
      }

      // Hide Cropper and show normal form fields by default
      document.getElementById('profile-edit-form').classList.remove('hidden');
      document.getElementById('cropping-view').classList.add('hidden');

      const modal = document.getElementById('profile-modal-container');
      modal.classList.remove('hidden');
      modal.classList.add('flex');
      lucide.createIcons();
    }

    function handleCloseProfileModal() {
      const modal = document.getElementById('profile-modal-container');
      modal.classList.remove('flex');
      modal.classList.add('hidden');
      
      // Destroy cropper instance if active
      if (cropperInstance) {
        cropperInstance.destroy();
        cropperInstance = null;
      }
    }

    function triggerAvatarUpload() {
      document.getElementById('profile-file-input').click();
    }

    // Handle initial image selection and init cropper wrapper
    function handleAvatarFileSelect(event) {
      const files = event.target.files;
      if (!files || files.length === 0) return;

      const file = files[0];
      const reader = new FileReader();
      reader.onload = function(e) {
        // Hide normal editing form and show cropping wrapper view
        document.getElementById('profile-edit-form').classList.add('hidden');
        document.getElementById('cropping-view').classList.remove('hidden');

        const cropImageNode = document.getElementById('cropping-image-element');
        cropImageNode.src = e.target.result;

        // Destroy old cropper instance if it exists
        if (cropperInstance) {
          cropperInstance.destroy();
        }

        // Initialize Cropper.js with 1:1 aspect ratio constraint
        cropperInstance = new Cropper(cropImageNode, {
          aspectRatio: 1,
          viewMode: 1,
          autoCropArea: 0.8,
          background: false,
          responsive: true,
          restore: false,
          guides: false,
          center: true,
          highlight: false,
          cropBoxMovable: true,
          cropBoxResizable: true,
          toggleDragModeOnDblclick: false
        });
      };
      reader.readAsDataURL(file);
    }

    function cancelCropping() {
      // Restore profile form and hide crop view
      document.getElementById('profile-edit-form').classList.remove('hidden');
      document.getElementById('cropping-view').classList.add('hidden');
      
      if (cropperInstance) {
        cropperInstance.destroy();
        cropperInstance = null;
      }
      // Reset file input
      document.getElementById('profile-file-input').value = '';
    }

    // Apply the cropping box coordinates, crop image, and save to temp storage
    function applyCroppedImage() {
      if (!cropperInstance) return;

      // Get high-res square cropped canvas matching design look
      const canvas = cropperInstance.getCroppedCanvas({
        width: 150,
        height: 150
      });

      const croppedDataUrl = canvas.toDataURL('image/jpeg', 0.9);
      
      // Update preview in Edit Profile Modal
      const previewNode = document.getElementById('modal-profile-avatar-preview');
      previewNode.innerHTML = `<img src="${croppedDataUrl}" class="w-full h-full rounded-full object-cover">`;

      // Keep avatar data temporarily in a tracking attribute
      document.getElementById('profile-file-input').dataset.tempCroppedData = croppedDataUrl;

      // Destroy cropper and return back to profile editing form
      document.getElementById('profile-edit-form').classList.remove('hidden');
      document.getElementById('cropping-view').classList.add('hidden');
      cropperInstance.destroy();
      cropperInstance = null;
    }

    // Handle main profile edit submit action
    function handleSaveProfile(event) {
      event.preventDefault();
      const updatedName = document.getElementById('profile-name-input').value.trim();
      const updatedPlan = document.getElementById('profile-plan-input').value.trim();
      const fileInput = document.getElementById('profile-file-input');

      if (!updatedName) {
        showToast('Please specify a profile name', 'error');
        return;
      }

      // Sync data to global app state
      state.profile.name = updatedName;
      state.profile.plan = updatedPlan;

      // If a newly cropped image exists, store it to active state avatar
      if (fileInput.dataset.tempCroppedData) {
        state.profile.avatar = fileInput.dataset.tempCroppedData;
        delete fileInput.dataset.tempCroppedData;
      }

      // Re-render layout and updates
      updateProfileUI();
      handleCloseProfileModal();
      showToast('Profile updated successfully');
    }
  </script>
</body>
</html>
